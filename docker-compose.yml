services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: velib
      POSTGRES_USER: velib
      POSTGRES_PASSWORD: velib
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file:
      - .env.example
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - mongo

  streamlit:
    build:
      context: .
      dockerfile: docker/streamlit.Dockerfile
    env_file:
      - .env.example
    volumes:
      - ./:/app
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  postgres_data:
  mongo_data:
